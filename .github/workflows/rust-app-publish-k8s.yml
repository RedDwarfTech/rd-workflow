name: Rust application publish to k8s

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        default: ""
      dockerfile:
        required: true
        type: string
        default: "Dockerfile"
      rust-version:
        required: false
        type: string
        default: "stable"
      app-namespace:
        required: true
        type: string
        default: "reddwarf-pro"
      app-name:
        required: true
        type: string
        default: "demo-app"

      image-name:
        required: true
        type: string
        default: "demo-app"
      app-tag:
        required: false
        type: string
        default: "default"

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Print all inputs and context
        run: |
          echo "app tag: ${{ inputs.app-tag }}"
          echo "app name: ${{ inputs.app-name }}"
          echo "app namespace: ${{ inputs.app-namespace }}"
          echo "target: ${{ inputs.target }}"
      - name: Check tag code
        if: ${{ inputs.app-tag != 'default' }}
        uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ inputs.app-tag }}
          fetch-depth: 0
      - name: Checkout
        if: ${{ inputs.app-tag == 'default' }}
        uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          targets: x86_64-unknown-linux-musl
          components: cargo

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_REPO_USER_NAME }}
          password: ${{ secrets.ALIYUN_DOCKER_REPO_USER_PASSWORD }}

      - name: Build image push to aliyun
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ secrets.ALI_DOCKER_HUB_REGISTRY }}/${{ inputs.app-namespace }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ${{ inputs.dockerfile }}
          push: true
          provenance: false
          sbom: false
    
        # https://github.com/steebchen/kubectl
      - name: deploy to cluster
        uses: steebchen/kubectl@v2.0.0
        with: # defaults to latest kubectl binary version
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          command: set image --record deployment/${{ inputs.app-name }} ${{ inputs.app-name }}=registry.cn-hongkong.aliyuncs.com/${{ inputs.app-namespace }}/${{ inputs.image-name }}:${{ github.sha }} -n ${{ inputs.app-namespace }}

      - name: verify deployment
        uses: steebchen/kubectl@v2.0.0
        with:
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          version: v1.21.0 # specify kubectl binary version explicitly
          command: rollout status deployment/${{ inputs.app-name }} -n ${{ inputs.app-namespace }}





